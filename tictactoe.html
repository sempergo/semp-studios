<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
      color: #e0e0e0;
    }

    .status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.8rem;
      color: #a0c4ff;
      font-weight: 600;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
      margin: 0 auto 1.5rem;
    }

    .cell {
      width: 110px;
      height: 110px;
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.taken { cursor: default; }

    .cell.x { color: #ff6b9d; }
    .cell.o { color: #a0c4ff; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 18px rgba(160, 196, 255, 0.5);
      animation: pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.08); }
    }

    .scores {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1.5rem;
    }

    .score-box {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 10px;
      padding: 0.6rem 1.4rem;
      min-width: 90px;
    }

    .score-box .label { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    .score-box .value { font-size: 1.8rem; font-weight: bold; }
    .score-box.x .value { color: #ff6b9d; }
    .score-box.o .value { color: #a0c4ff; }
    .score-box.tie .value { color: #888; }

    button {
      background: #0f3460;
      color: #eee;
      border: none;
      border-radius: 8px;
      padding: 0.7rem 2rem;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s;
      letter-spacing: 1px;
    }

    button:hover { background: #1a5276; }
  </style>
</head>
<body>
  <div class="container">
    <h1>TIC TAC TOE</h1>
    <div class="status" id="status">X's turn</div>

    <div class="scores">
      <div class="score-box x">
        <div class="label">X</div>
        <div class="value" id="score-x">0</div>
      </div>
      <div class="score-box tie">
        <div class="label">Tie</div>
        <div class="value" id="score-tie">0</div>
      </div>
      <div class="score-box o">
        <div class="label">O</div>
        <div class="value" id="score-o">0</div>
      </div>
    </div>

    <div class="board" id="board">
      <div class="cell" data-i="0"></div>
      <div class="cell" data-i="1"></div>
      <div class="cell" data-i="2"></div>
      <div class="cell" data-i="3"></div>
      <div class="cell" data-i="4"></div>
      <div class="cell" data-i="5"></div>
      <div class="cell" data-i="6"></div>
      <div class="cell" data-i="7"></div>
      <div class="cell" data-i="8"></div>
    </div>

    <button id="restart">New Game</button>
  </div>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, scores;

    function init() {
      board = Array(9).fill('');
      current = 'X';
      gameOver = false;
      if (!scores) scores = { X: 0, O: 0, T: 0 };
      render();
    }

    function render() {
      const cells = document.querySelectorAll('.cell');
      cells.forEach((cell, i) => {
        cell.textContent = board[i];
        cell.className = 'cell' + (board[i] ? ' taken ' + board[i].toLowerCase() : '');
      });
      document.getElementById('status').textContent = gameOver
        ? (gameOver === 'T' ? "It's a tie!" : `${gameOver} wins!`)
        : `${current}'s turn`;
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-tie').textContent = scores.T;
    }

    function checkWin() {
      for (const [a,b,c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a,b,c] };
        }
      }
      if (board.every(Boolean)) return { winner: null, tie: true };
      return null;
    }

    document.getElementById('board').addEventListener('click', e => {
      const cell = e.target.closest('.cell');
      if (!cell || gameOver || board[cell.dataset.i]) return;

      board[cell.dataset.i] = current;
      const result = checkWin();

      if (result) {
        gameOver = result.tie ? 'T' : result.winner;
        if (result.tie) {
          scores.T++;
        } else {
          scores[result.winner]++;
          result.line.forEach(i => document.querySelectorAll('.cell')[i].classList.add('win'));
        }
      } else {
        current = current === 'X' ? 'O' : 'X';
      }

      render();
    });

    document.getElementById('restart').addEventListener('click', init);

    init();
  </script>
</body>
</html>
